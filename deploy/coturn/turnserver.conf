# Coturn TURN server configuration
# See: https://github.com/coturn/coturn

listening-port=3478
tls-listening-port=5349
fingerprint
realm=voxmeet

# STUN only by default — add turn credentials for TURN
no-auth
stun-only

# Verbosity
verbose

# For TURN support, uncomment and configure:
# use-auth-secret
# static-auth-secret=your-turn-secret
# realm=voxmeet.local
# total-quota=100
# bps-capacity=0
# stale-nonce=600
